<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card">
        <div class="search">
            <input type="text" id="city-input" placeholder="Digite a cidade...">
            <button id="search-btn">🔍</button>
        </div>
      
        <div class="weather-info hidden" id="weather-info">
            <h2 id="city-name">--</h2>
            <img src="" alt="clima" id="weather-icon">
            <h1 id="temp">--°C</h1>
            <p id="description">--</p>
            
            <div class="details">
                <div>💧 Umidade: <span id="humidity">--</span>%</div>
                <div>🌬️ Vento: <span id="wind">--</span> km/h</div>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
